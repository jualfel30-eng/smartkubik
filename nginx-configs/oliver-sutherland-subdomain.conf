# ========================================
# NGINX CONFIG — Oliver Sutherland (subdominio staging)
# ========================================
# Sirve la página estática de Oliver Sutherland en oliver.smartkubik.com.
# El server_name exacto vence al regex de storefront-subdomain.conf
# (que cataclea *.smartkubik.com hacia Next.js port 3001), por lo que
# este bloque tiene precedencia para oliver.smartkubik.com sin conflicto.
#
# Cuando el cliente apruebe y apunte oliversutherland.com a este server,
# añade su dominio al server_name de ambos bloques (HTTP + HTTPS) y
# obtené un cert nuevo: sudo certbot --nginx -d oliversutherland.com -d www.oliversutherland.com
#
# Instalación (una sola vez en el server):
#   sudo cp ~/smartkubik/nginx-configs/oliver-sutherland-subdomain.conf /etc/nginx/sites-available/oliver-sutherland
#   sudo ln -s /etc/nginx/sites-available/oliver-sutherland /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# El cert wildcard *.smartkubik.com (en /etc/letsencrypt/live/smartkubik.com-0001/)
# ya cubre oliver.smartkubik.com — no hace falta certbot para staging.

# HTTP — redirect a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name oliver.smartkubik.com;

    # Cloudflare Real IP — los logs muestran IP real del cliente
    real_ip_header CF-Connecting-IP;

    return 301 https://$host$request_uri;
}

# HTTPS — sitio estático (HTML + assets)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oliver.smartkubik.com;

    # Cert wildcard ya emitido para *.smartkubik.com
    ssl_certificate /etc/letsencrypt/live/smartkubik.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartkubik.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers — alineados con el resto del stack smartkubik
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CSP — permite:
    #  - Stripe.js + Google Fonts (cargados explícitamente por la página)
    #  - `blob:` en media-src/worker-src porque el scroll-driven video descarga
    #    los .mp4 vía fetch() y los asigna como `URL.createObjectURL(blob)`
    #    para que el scrubbing por scroll (currentTime = t) sea fluido.
    #  - static.cloudflareinsights.com → CF inyecta automáticamente su beacon
    #    de Web Analytics (`beacon.min.js`) cuando la zona tiene Insights ON.
    #    Sin este allow, el browser tira `Content Security Policy directive`
    #    aunque la página funcione (ruido de consola). Si no querés analítica
    #    de CF, apaga "Web Analytics" para oliver.smartkubik.com en el dashboard.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://fonts.googleapis.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob:; worker-src 'self' blob:; connect-src 'self' https://api.smartkubik.com https://api.stripe.com https://q.stripe.com https://r.stripe.com https://cloudflareinsights.com; frame-src https://js.stripe.com https://hooks.stripe.com; base-uri 'self'; form-action 'self'" always;

    root /home/deployer/smartkubik/oliver-sutherland;
    index index.html;

    # Cloudflare Real IP
    real_ip_header CF-Connecting-IP;

    # Compresión: el HTML pesa ~150 KB; los .webp y .mp4 ya están comprimidos.
    # nginx siempre gzipea text/html cuando gzip on; no hace falta listarlo.
    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Cache largo para assets; el HTML siempre fresco para que cambios al
    # OS_CONFIG (tenantId / Stripe key) lleguen al instante.
    #
    # GOTCHA NGINX (importante): cualquier `add_header` dentro de un location
    # rompe la herencia de TODOS los `add_header` server-level (incluyendo
    # CSP/HSTS/etc). Por eso usamos `expires` (módulo ngx_http_headers_module
    # que setea Cache-Control automáticamente) en lugar de `add_header
    # Cache-Control`. Así los headers de seguridad siguen heredándose.
    location / {
        try_files $uri $uri/ =404;
        expires off;          # Cache-Control: no-cache (HTML siempre fresco)
    }

    location /assets/ {
        # Videos grandes (hero-goats.mp4 6.6MB, fiber-macro 12.7MB) merecen
        # cache largo en navegador + Cloudflare.
        expires 30d;
        access_log off;
    }

    # Range requests para los .mp4 del hero (scroll-driven video).
    # nginx ya soporta byte-range bytes nativamente; la directiva `mp4`
    # requiere el módulo ngx_http_mp4_module (no presente en este build),
    # pero NO es necesaria para streaming progresivo correcto.
    location ~* \.(mp4|webm)$ {
        expires 30d;
    }

    # NO redirigir 404 → /. La página estática usa codec-cascade probing:
    # `fetch('assets/hero-goats-scroll.av1.mp4', {method:'HEAD'})`. Si el archivo
    # no existe debe responder 404 (que el JS intercepta y baja al siguiente
    # candidato), NO un 302 a / que sería seguido por fetch (default
    # redirect=follow), devolvería el HTML como "OK", y el JS terminaría
    # cargando el index.html como blob de video → NotSupportedError.
    # Si en el futuro queremos un 404 page custom, usar `error_page 404 /404.html`
    # con archivo estático real, NO un redirect.
}
